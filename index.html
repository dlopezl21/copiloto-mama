<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Copiloto — Tu ayuda para llegar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-deep:#1F5E63;
    --teal-dark:#153F43;
    --cream:#FBF6EC;
    --ink:#1B2B2E;
    --sun:#F2A93B;
    --sun-dark:#D98F1F;
    --coral:#E2653F;
    --green:#4C9A6A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Nunito',sans-serif;
    background:radial-gradient(circle at 50% 0%, var(--teal-deep), var(--teal-dark) 75%);
    color:var(--cream);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 20px 60px;
  }
  h1{
    font-family:'Quicksand',sans-serif;
    font-weight:700;
    font-size:2rem;
    margin:6px 0 2px;
    text-align:center;
  }
  .subtitle{
    font-size:1.15rem;
    opacity:.9;
    text-align:center;
    margin:0 0 18px;
    max-width:420px;
  }
  .dial-wrap{
    position:relative;
    width:220px;height:220px;
    display:flex;align-items:center;justify-content:center;
    margin:10px 0 8px;
  }
  .dial-ring{
    position:absolute;inset:0;
    border-radius:50%;
    border:3px dashed rgba(242,169,59,.45);
    animation:spin 30s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .mic-btn{
    width:170px;height:170px;
    border-radius:50%;
    border:none;
    background:linear-gradient(160deg, var(--sun), var(--sun-dark));
    box-shadow:0 10px 30px rgba(0,0,0,.35), inset 0 -6px 0 rgba(0,0,0,.12);
    color:var(--ink);
    font-size:3.4rem;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:transform .15s ease;
  }
  .mic-btn:active{transform:scale(.94);}
  .mic-btn.listening{
    animation:pulse 1.1s ease-in-out infinite;
    background:linear-gradient(160deg, var(--coral), #B84326);
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 10px 30px rgba(0,0,0,.35), 0 0 0 0 rgba(226,101,63,.55);}
    50%{box-shadow:0 10px 30px rgba(0,0,0,.35), 0 0 0 22px rgba(226,101,63,0);}
  }
  .mic-label{
    font-family:'Quicksand',sans-serif;
    font-weight:600;
    font-size:1.3rem;
    margin-top:6px;
    min-height:1.6em;
    text-align:center;
  }
  .status-line{
    font-size:1.05rem;
    min-height:1.6em;
    text-align:center;
    max-width:440px;
    opacity:.92;
  }
  .confirm-card{
    display:none;
    background:var(--cream);
    color:var(--ink);
    border-radius:20px;
    padding:18px 20px;
    max-width:440px;
    width:100%;
    margin-top:6px;
    text-align:center;
    box-shadow:0 8px 0 rgba(0,0,0,.18);
  }
  .confirm-card.show{display:block;}
  .confirm-card .dest{
    font-family:'Quicksand',sans-serif;
    font-weight:700;
    font-size:1.3rem;
    margin-bottom:12px;
  }
  .confirm-btn{
    background:var(--green);
    color:white;
    border:none;
    padding:16px 22px;
    border-radius:16px;
    font-family:'Quicksand',sans-serif;
    font-weight:700;
    font-size:1.25rem;
    width:100%;
    cursor:pointer;
    margin-bottom:10px;
  }
  .confirm-cancel{
    background:transparent;
    border:2px solid #d8cfbb;
    color:var(--ink);
    padding:10px 16px;
    border-radius:14px;
    font-weight:700;
    cursor:pointer;
  }
  .favs{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    width:100%;
    max-width:460px;
    margin-top:22px;
  }
  .fav-btn{
    background:var(--cream);
    color:var(--ink);
    border:none;
    border-radius:20px;
    padding:18px 10px;
    font-family:'Quicksand',sans-serif;
    font-weight:600;
    font-size:1.3rem;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    box-shadow:0 6px 0 rgba(0,0,0,.18);
    cursor:pointer;
  }
  .fav-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .fav-emoji{font-size:2.4rem;}
  .fav-sub{font-size:.85rem;font-weight:400;opacity:.65;max-width:150px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bottom-actions{
    margin-top:26px;
    display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
  }
  .ghost-btn{
    background:transparent;
    border:2px solid rgba(251,246,236,.5);
    color:var(--cream);
    padding:12px 20px;
    border-radius:16px;
    font-family:'Nunito',sans-serif;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
  }
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.55);
    display:none;align-items:center;justify-content:center;padding:20px;z-index:10;
  }
  .modal-bg.open{display:flex;}
  .modal{
    background:var(--cream);color:var(--ink);
    border-radius:22px;padding:24px;max-width:440px;width:100%;
    max-height:88vh;overflow-y:auto;
  }
  .modal h2{font-family:'Quicksand',sans-serif;margin-top:0;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-weight:700;margin-bottom:4px;font-size:.95rem;}
  .field input{
    width:100%;padding:12px;border-radius:12px;border:2px solid #d8cfbb;
    font-size:1.05rem;font-family:'Nunito',sans-serif;
  }
  .modal-actions{display:flex;gap:10px;margin-top:10px;}
  .solid-btn{
    flex:1;background:var(--teal-deep);color:var(--cream);border:none;
    padding:14px;border-radius:14px;font-weight:700;font-size:1.05rem;cursor:pointer;
  }
  .solid-btn.secondary{background:#d8cfbb;color:var(--ink);}
  .settings-gear{
    position:fixed;top:16px;right:16px;
    background:rgba(251,246,236,.15);border:none;color:var(--cream);
    width:46px;height:46px;border-radius:50%;font-size:1.3rem;cursor:pointer;
  }
  @media (prefers-reduced-motion: reduce){
    .dial-ring{animation:none;}
    .mic-btn.listening{animation:none;}
  }
</style>
</head>
<body>

<button class="settings-gear" onclick="openSettings()" aria-label="Ajustes">⚙️</button>

<h1>¿A dónde vamos?</h1>
<p class="subtitle">Toca el botón grande y di a dónde quieres ir, o elige uno de tus sitios de siempre.</p>

<div class="dial-wrap">
  <div class="dial-ring"></div>
  <button class="mic-btn" id="micBtn" onclick="toggleListening()" aria-label="Hablar para indicar destino">🎤</button>
</div>
<div class="mic-label" id="micLabel">Toca para hablar</div>
<div class="status-line" id="statusLine"></div>

<div class="confirm-card" id="confirmCard">
  <div class="dest" id="confirmDest"></div>
  <a class="confirm-btn" id="confirmBtn" href="#" target="_blank" rel="noopener" style="text-decoration:none;display:block;text-align:center;">📍 Abrir Google Maps</a>
  <button class="confirm-cancel" onclick="hideConfirm()">Cancelar</button>
</div>

<div class="favs" id="favsGrid"></div>

<div class="bottom-actions">
  <button class="ghost-btn" onclick="speak('Toca el círculo naranja y di, por ejemplo: llévame a casa de Davor. Luego toca el botón verde para abrir el mapa. También puedes tocar directamente uno de los botones de abajo.')">🔊 Cómo funciona</button>
</div>

<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h2>Sitios guardados</h2>
    <p style="margin-top:-8px;font-size:.95rem;">Escribe la dirección exacta (o el nombre del lugar en Google Maps) para cada botón.</p>
    <div id="fieldsWrap"></div>
    <div class="modal-actions">
      <button class="solid-btn secondary" onclick="closeSettings()">Cerrar</button>
      <button class="solid-btn" onclick="saveFavorites()">Guardar</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'copiloto_favoritos_v2';

const DEFAULT_FAVS = [
  {key:'casa',   emoji:'🏠', label:'Casa',          address:'', keywords:['casa','mi casa','hogar']},
  {key:'super',  emoji:'🛒', label:'Supermercado',  address:'', keywords:['super','supermercado','mercado','compras']},
  {key:'davor',  emoji:'🚪', label:'Casa de Davor', address:'', keywords:['davor']},
  {key:'dano',   emoji:'🚪', label:'Casa de Dano',  address:'', keywords:['dano']},
  {key:'raca',   emoji:'🚪', label:'Casa de Raca',  address:'', keywords:['raca']}
];

let favorites = JSON.parse(JSON.stringify(DEFAULT_FAVS));
let memoryFallback = {}; // por si localStorage no está disponible en el navegador

function loadFavorites(){
  let saved = null;
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) saved = JSON.parse(raw);
  }catch(e){
    saved = memoryFallback;
  }
  if(saved){
    favorites = favorites.map(f => ({...f, address: saved[f.key] || ''}));
  }
  renderFavs();
}

function persistFavorites(data){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }catch(e){
    memoryFallback = data; // se mantiene solo durante esta sesión si el navegador bloquea el guardado
  }
}

function saveFavorites(){
  const data = {};
  favorites.forEach(f=>{
    const input = document.getElementById('input-'+f.key);
    f.address = input.value.trim();
    data[f.key] = f.address;
  });
  persistFavorites(data);
  renderFavs();
  closeSettings();
  speak('Guardado.');
}

function renderFavs(){
  const grid = document.getElementById('favsGrid');
  grid.innerHTML = '';
  favorites.forEach(f=>{
    const btn = document.createElement('a');
    btn.className = 'fav-btn';
    btn.style.textDecoration = 'none';
    if(f.address){
      btn.href = buildMapsUrl(f.address);
      btn.target = '_blank';
      btn.rel = 'noopener';
      btn.addEventListener('click', function(){ speak('Vale, te llevo a ' + f.label + '.'); });
    } else {
      btn.href = '#';
      btn.addEventListener('click', function(e){ e.preventDefault(); openSettings(); });
    }
    btn.innerHTML = '<span class="fav-emoji">'+f.emoji+'</span><span>'+f.label+'</span>'+
      '<span class="fav-sub">'+(f.address ? f.address : 'Toca ⚙️ para añadir dirección')+'</span>';
    grid.appendChild(btn);
  });
}

function openSettings(){
  const wrap = document.getElementById('fieldsWrap');
  wrap.innerHTML = '';
  favorites.forEach(f=>{
    const div = document.createElement('div');
    div.className = 'field';
    div.innerHTML = '<label>'+f.emoji+' '+f.label+'</label>'+
      '<input id="input-'+f.key+'" type="text" placeholder="Ej: Calle Mayor 12, Madrid" value="'+(f.address || '')+'">';
    wrap.appendChild(div);
  });
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings(){
  document.getElementById('settingsModal').classList.remove('open');
}

function normalize(str){
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .trim();
}

function speak(text){
  try{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'es-ES';
    u.rate = 0.95;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function buildMapsUrl(address){
  return 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(address) + '&travelmode=driving';
}

// Navegación inmediata, siempre disparada directamente por un toque del usuario
// (evita que el navegador del móvil bloquee la apertura del mapa)
function openMapsNow(address, label){
  document.getElementById('statusLine').textContent = 'Abriendo el camino a ' + label + '...';
  speak('Vale, te llevo a ' + label + '.');
  window.location.href = buildMapsUrl(address);
}

let pendingAddress = '';
function showConfirm(address, label){
  pendingAddress = address;
  document.getElementById('confirmDest').textContent = '¿Vamos a "' + label + '"?';
  document.getElementById('confirmCard').classList.add('show');
  const btn = document.getElementById('confirmBtn');
  btn.href = buildMapsUrl(address);
  btn.onclick = function(){ speak('Vale, te llevo a ' + label + '.'); setTimeout(hideConfirm, 300); };
  speak('¿Vamos a ' + label + '? Toca el botón verde para abrir el mapa.');
}
function hideConfirm(){
  document.getElementById('confirmCard').classList.remove('show');
}

// --- Reconocimiento de voz ---
let recognition = null;
let listening = false;

function setupRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('statusLine').textContent = 'Este navegador no permite hablar aquí. Usa los botones de abajo, o abre esta página con Chrome.';
    return null;
  }
  const r = new SR();
  r.lang = 'es-ES';
  r.continuous = false;
  r.interimResults = false;
  r.maxAlternatives = 1;

  r.onstart = function(){
    listening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micLabel').textContent = 'Te escucho...';
    document.getElementById('statusLine').textContent = '';
    hideConfirm();
  };
  r.onend = function(){
    listening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micLabel').textContent = 'Toca para hablar';
  };
  r.onerror = function(e){
    listening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micLabel').textContent = 'Toca para hablar';
    let msg = 'No te he entendido bien. Inténtalo otra vez.';
    if(e.error === 'not-allowed' || e.error === 'permission-denied'){
      msg = 'Falta permiso para usar el micrófono. Actívalo en los ajustes del teléfono.';
    }
    document.getElementById('statusLine').textContent = msg;
    speak(msg);
  };
  r.onresult = function(event){
    const transcript = event.results[0][0].transcript;
    handleTranscript(transcript);
  };
  return r;
}

function handleTranscript(transcript){
  const norm = normalize(transcript);
  document.getElementById('statusLine').textContent = 'Has dicho: "' + transcript + '"';

  let match = null;
  for(const f of favorites){
    if(f.keywords.some(function(k){ return norm.includes(normalize(k)); })){
      match = f;
      break;
    }
  }

  if(match && match.address){
    showConfirm(match.address, match.label);
    return;
  }
  if(match && !match.address){
    const msg = 'Aún no tengo guardada la dirección de ' + match.label + '. Pide a tu hijo que la añada en ajustes.';
    document.getElementById('statusLine').textContent = msg;
    speak(msg);
    return;
  }

  // Destino libre: usamos el propio texto dicho como dirección/búsqueda
  showConfirm(transcript, transcript);
}

function toggleListening(){
  if(!recognition) recognition = setupRecognition();
  if(!recognition) return;
  if(listening){
    recognition.stop();
  } else {
    try{ recognition.start(); }catch(e){}
  }
}

loadFavorites();
</script>
</body>
</html>
